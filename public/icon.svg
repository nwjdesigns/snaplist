<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="1200" rx="240" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="280" y="420" width="640" height="460" rx="60" fill="white" opacity="0.95"/>
  <!-- Camera lens bump -->
  <rect x="460" y="340" width="200" height="100" rx="30" fill="white" opacity="0.95"/>
  <!-- Camera lens outer -->
  <circle cx="600" cy="620" r="150" fill="none" stroke="#6C5CE7" stroke-width="24"/>
  <!-- Camera lens inner -->
  <circle cx="600" cy="620" r="80" fill="#6C5CE7" opacity="0.3"/>
  <!-- Camera lens dot -->
  <circle cx="600" cy="620" r="30" fill="#6C5CE7"/>
  <!-- Flash/snap bolt -->
  <polygon points="820,380 780,480 830,480 790,560 870,450 820,450 860,380" fill="#fbbf24"/>
</svg>
